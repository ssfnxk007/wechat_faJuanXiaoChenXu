              - listitem [ref=e518]:
                - code [ref=e519]: tip
                - text: ": 在"
                - code [ref=e520]: bindgetphonenumber
                - text: 等返回加密信息的回调中调用
                - link "wx.login" [ref=e521] [cursor=pointer]:
