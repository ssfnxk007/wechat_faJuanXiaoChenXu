                - text: 登录，可能会刷新登录态。此时服务器使用 code 换取的 sessionKey 不是加密时使用的 sessionKey，导致解密失败。建议开发者提前进行
                - code [ref=e522]: login
                - text: ；或者在回调中先使用
                - code [ref=e523]: checkSession
                - text: 进行登录态检查，避免
                - code [ref=e524]: login
                - text: 刷新登录态。
